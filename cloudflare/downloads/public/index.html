<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Disk Usage Analyzer Downloads</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Disk Usage Analyzer</p>
        <h1>Native installers for macOS, Windows, and Linux.</h1>
        <p class="lede">
          Download the latest nightly build. Stable releases will appear here
          when version tags are published.
        </p>
        <div class="actions">
          <a href="/download/nightly/macos">macOS</a>
          <a href="/download/nightly/windows">Windows</a>
          <a href="/download/nightly/linux">Linux</a>
        </div>
      </section>

      <section class="panel" aria-labelledby="manifest-title">
        <h2 id="manifest-title">Release manifest</h2>
        <p>
          Machine-readable release metadata is available at
          <a href="/api/releases/latest?channel=nightly">/api/releases/latest?channel=nightly</a>.
        </p>
      </section>
    </main>
  </body>
</html>
