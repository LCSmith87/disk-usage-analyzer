name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release versions
        run: pnpm release:check-version

      - name: Test frontend, Worker, and release scripts
        run: pnpm test --run

      - name: Build frontend
        run: pnpm build

      - name: Typecheck Cloudflare Worker
        run: pnpm cf:typecheck

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
